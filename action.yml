name: 'GitHub Weekly Reporter'
description: 'Generate a beautiful weekly GitHub activity report and deploy to GitHub Pages'
author: 'deariary'

branding:
  icon: 'bar-chart-2'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for API access and deployment'
    required: true
  username:
    description: 'GitHub username to generate the report for'
    required: false
    default: ${{ github.actor }}
  mode:
    description: 'Run mode: "daily" (accumulate events) or "weekly" (full report generation)'
    required: false
    default: 'daily'
  theme:
    description: 'Report theme (default, dark)'
    required: false
    default: 'default'
  language:
    description: 'Report language (en, ja)'
    required: false
    default: 'en'
  timezone:
    description: 'IANA timezone for date calculations (e.g. "Asia/Tokyo", "UTC")'
    required: false
    default: 'UTC'
  openai-api-key:
    description: 'OpenAI API key for AI narrative'
    required: false
    default: ''
  anthropic-api-key:
    description: 'Anthropic API key for AI narrative'
    required: false
    default: ''
  gemini-api-key:
    description: 'Gemini API key for AI narrative'
    required: false
    default: ''
  llm-provider:
    description: 'LLM provider (openai, anthropic, gemini)'
    required: false
    default: ''
  llm-model:
    description: 'LLM model name'
    required: false
    default: ''
  version:
    description: 'CLI version to use (e.g. "1.2.0", "latest")'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Daily fetch (accumulate events)
      if: inputs.mode == 'daily'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_USERNAME: ${{ inputs.username }}
        TIMEZONE: ${{ inputs.timezone }}
        DATA_DIR: ./data
      run: npx github-weekly-reporter@${{ inputs.version }} daily-fetch

    - name: Weekly fetch (build full data from accumulated events)
      if: inputs.mode == 'weekly'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_USERNAME: ${{ inputs.username }}
        TIMEZONE: ${{ inputs.timezone }}
        DATA_DIR: ./data
      run: npx github-weekly-reporter@${{ inputs.version }} weekly-fetch

    - name: Generate AI content
      if: inputs.mode == 'weekly'
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        LLM_PROVIDER: ${{ inputs.llm-provider }}
        LLM_MODEL: ${{ inputs.llm-model }}
        LANGUAGE: ${{ inputs.language }}
        TIMEZONE: ${{ inputs.timezone }}
        DATA_DIR: ./data
      run: |
        if [ -n "$LLM_PROVIDER" ] && [ -n "$LLM_MODEL" ]; then
          npx github-weekly-reporter@${{ inputs.version }} generate
        else
          echo "No LLM provider configured, skipping AI content generation"
        fi

    - name: Render HTML report
      if: inputs.mode == 'weekly'
      shell: bash
      env:
        LANGUAGE: ${{ inputs.language }}
        TIMEZONE: ${{ inputs.timezone }}
        DATA_DIR: ./data
        OUTPUT_DIR: ./output
      run: npx github-weekly-reporter@${{ inputs.version }} render --theme ${{ inputs.theme }}

    - name: Deploy to GitHub Pages
      if: inputs.mode == 'weekly'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        OUTPUT_DIR: ./output
      run: npx github-weekly-reporter@${{ inputs.version }} deploy
