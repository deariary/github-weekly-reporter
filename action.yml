name: 'GitHub Weekly Reporter'
description: 'Generate a beautiful weekly GitHub activity report and deploy to GitHub Pages'
author: 'deariary'

branding:
  icon: 'bar-chart-2'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for API access and deployment (requires contents: write permission)'
    required: true
  username:
    description: 'GitHub username to generate the report for'
    required: false
    default: ${{ github.actor }}
  mode:
    description: 'Run mode: "daily" (accumulate events) or "weekly" (full report generation)'
    required: false
    default: 'daily'
  theme:
    description: 'Report theme (default, dark)'
    required: false
    default: 'default'
  language:
    description: 'Report language (en, ja)'
    required: false
    default: 'en'
  timezone:
    description: 'IANA timezone for date calculations (e.g. "Asia/Tokyo", "UTC")'
    required: false
    default: 'UTC'
  openai-api-key:
    description: 'OpenAI API key for AI narrative'
    required: false
    default: ''
  anthropic-api-key:
    description: 'Anthropic API key for AI narrative'
    required: false
    default: ''
  gemini-api-key:
    description: 'Gemini API key for AI narrative'
    required: false
    default: ''
  llm-provider:
    description: 'LLM provider (openai, anthropic, gemini)'
    required: false
    default: ''
  llm-model:
    description: 'LLM model name'
    required: false
    default: ''
  date:
    description: 'Target date within the week (YYYY-MM-DD). Defaults to today. Use to generate reports for past weeks.'
    required: false
    default: ''
  version:
    description: 'CLI version to use (e.g. "1.2.0", "latest")'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Configure git credentials
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
      run: |
        git config user.name "github-weekly-reporter[bot]"
        git config user.email "github-weekly-reporter[bot]@users.noreply.github.com"
        echo "https://x-access-token:${GITHUB_TOKEN}@github.com" \
          > "$HOME/.git-credentials"
        git config credential.helper "store --file=$HOME/.git-credentials"

    # --- Daily mode: fetch events and persist ---

    - name: Daily fetch (accumulate events)
      if: inputs.mode == 'daily'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_USERNAME: ${{ inputs.username }}
        TIMEZONE: ${{ inputs.timezone }}
        DATA_DIR: ./data
      run: npx github-weekly-reporter@${{ inputs.version }} daily-fetch ${{ inputs.date && format('--date {0}', inputs.date) || '' }}

    - name: Commit and push data (daily)
      if: inputs.mode == 'daily'
      shell: bash
      run: |
        git add data/
        if git diff --cached --quiet; then
          echo "No new data to commit"
        else
          git pull --rebase
          git commit -m "data: daily events $(date -u +%Y-%m-%d)"
          git push
        fi

    # --- Weekly mode: full pipeline ---

    - name: Weekly fetch (build full data from accumulated events)
      if: inputs.mode == 'weekly'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_USERNAME: ${{ inputs.username }}
        TIMEZONE: ${{ inputs.timezone }}
        DATA_DIR: ./data
      run: npx github-weekly-reporter@${{ inputs.version }} weekly-fetch ${{ inputs.date && format('--date {0}', inputs.date) || '' }}

    - name: Generate AI content
      if: inputs.mode == 'weekly'
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        LLM_PROVIDER: ${{ inputs.llm-provider }}
        LLM_MODEL: ${{ inputs.llm-model }}
        LANGUAGE: ${{ inputs.language }}
        TIMEZONE: ${{ inputs.timezone }}
        DATA_DIR: ./data
      run: |
        if [ -n "$LLM_PROVIDER" ] && [ -n "$LLM_MODEL" ]; then
          npx github-weekly-reporter@${{ inputs.version }} generate ${{ inputs.date && format('--date {0}', inputs.date) || '' }}
        else
          echo "No LLM provider configured, skipping AI content generation"
        fi

    - name: Commit and push data (weekly)
      if: inputs.mode == 'weekly'
      shell: bash
      run: |
        git add data/
        if git diff --cached --quiet; then
          echo "No new data to commit"
        else
          git pull --rebase
          git commit -m "data: weekly report $(date -u +%Y-%m-%d)"
          git push
        fi

    - name: Render HTML report
      if: inputs.mode == 'weekly'
      shell: bash
      env:
        LANGUAGE: ${{ inputs.language }}
        TIMEZONE: ${{ inputs.timezone }}
        DATA_DIR: ./data
        OUTPUT_DIR: ./output
      run: npx github-weekly-reporter@${{ inputs.version }} render --theme ${{ inputs.theme }} ${{ inputs.date && format('--date {0}', inputs.date) || '' }}

    - name: Deploy to GitHub Pages
      if: inputs.mode == 'weekly'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        OUTPUT_DIR: ./output
      run: npx github-weekly-reporter@${{ inputs.version }} deploy ${{ inputs.date && format('--date {0}', inputs.date) || '' }}
