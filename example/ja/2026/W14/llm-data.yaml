    heading: deariary/github-weekly-reporterに全集中
    body: 新プロジェクトのgithub-weekly-reporterに20のPRを集中投下し、0からプロダクトレベルまで一気に構築した。TypeScript + ESMの基盤からGitHub
      API連携、LLM統合、デプロイ機能まで全て実装。他のリポジトリはdependency更新やレビューのみで、完全にこのプロジェクトにフォーカスした週だった。npmパッケージとして@deariary/github-weekly-reporterで公開準備も完了。
